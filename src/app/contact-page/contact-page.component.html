<div id="contact" class="container container__contact">
    <div class="inner-container">
        <h2 class="title">Kontakt</h2>
        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="info-item">
                    <h3>Adres</h3>
                    <p>ul. Przykładowa 123<br>00-000 Warszawa</p>
                </div>
                <div class="info-item">
                    <h3>Telefon</h3>
                    <p><a href="tel:+48000000000">+48 000 000 000</a></p>
                </div>
                <div class="info-item">
                    <h3>Email</h3>
                    <p><a href="mailto:kontakt&#64;salon.pl">kontakt&#64;salon.pl</a></p>
                </div>
                <div class="info-item">
                    <h3>Godziny otwarcia</h3>
                    <p>Pon-Pt: 9:00 - 18:00<br>Sb: 9:00 - 15:00<br>Nd: Zamknięte</p>
                </div>
            </div>
            <div class="contact-form-wrapper">
                <h3>Wyślij wiadomość</h3>
                <form class="contact-form" [formGroup]="contactForm" (ngSubmit)="onSubmit()">
                    <div class="form-group">
                        <label for="name">Imię i nazwisko *</label>
                        <input type="text" id="name" formControlName="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" formControlName="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Telefon</label>
                        <input type="tel" id="phone" formControlName="phone">
                    </div>
                    <div class="form-group">
                        <label for="message">Wiadomość *</label>
                        <textarea id="message" formControlName="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn" [disabled]="!contactForm.valid || isSubmitting">
                        {{ isSubmitting ? 'Wysyłanie...' : 'Wyślij' }}
                    </button>
                    <div class="form-message" *ngIf="formMessage">
                        <p [class.success]="formSuccess" [class.error]="!formSuccess">{{ formMessage }}</p>
                    </div>
                </form>
            </div>
        </div>
        <div class="map-wrapper">
            <h3 class="title">Znajdź nas</h3>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2443.5!2d21.0122!3d52.2297!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNTLCsDEzJzQ2LjkiTiAyMcKwMDAnNDMuOSJF!5e0!3m2!1spl!2spl!4v1234567890"
                width="100%" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade"
                class="map-iframe">
            </iframe>
        </div>
    </div>
</div>
