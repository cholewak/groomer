<section id="contact" class="contact">
  <div class="contact__container">
    <div class="contact__header">
      <h2 class="contact__title">Skontaktuj Się Z Nami</h2>
      <p class="contact__subtitle">Jesteśmy tutaj, aby odpowiedzieć na wszystkie Twoje pytania</p>
    </div>

    <div class="contact__content">
      <div class="contact__info">
        <div
          class="contact__info-card"
          *ngFor="let info of contactInfo"
          (click)="onCardClick(info)"
          [class.contact__info-card--clickable]="info.type"
        >
          <div class="contact__info-icon">{{ info.icon }}</div>
          <h3 class="contact__info-title">{{ info.title }}</h3>
          <p class="contact__info-text" [innerHTML]="info.text"></p>
        </div>
      </div>

    </div>

    <div class="contact__map-section">
      <h3 class="contact__map-title">Znajdź Nas</h3>
      <div class="contact__map-wrapper">
        <iframe 
          src="https://www.google.com/maps?q=Salon+pielęgnacji+psów+i+kotów+Karolina+Jakubek,+Objazdowa+15,+43-430+Skoczów&hl=pl&z=18&output=embed"
          width="100%" 
          height="500" 
          style="border:0;" 
          allowfullscreen="" 
          loading="lazy" 
          referrerpolicy="no-referrer-when-downgrade"
          class="contact__map">
        </iframe>
      </div>
    </div>
  </div>
  
  <button 
    *ngIf="showScrollButton" 
    class="scroll-to-top" 
    (click)="scrollToTop()"
    aria-label="Przewiń do góry">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>
</section>
