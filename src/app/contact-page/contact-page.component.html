<section id="contact" class="contact">
  <div class="contact__container">
    <div class="contact__header">
      <h2 class="contact__title">Skontaktuj Się Z Nami</h2>
      <p class="contact__subtitle">Jesteśmy tutaj, aby odpowiedzieć na wszystkie Twoje pytania</p>
      <button class="scroll-down-btn" (click)="scrollToContent()" aria-label="Przewiń w dół">
        <span class="scroll-down-text">Przewiń w dół</span>
        <svg class="scroll-down-arrow" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M12 19l-7-7M12 19l7-7"/>
        </svg>
      </button>
    </div>

    <div class="contact__content">
      <div class="contact__info">
        <div class="contact__info-card" *ngFor="let info of contactInfo">
          <div class="contact__info-icon">{{ info.icon }}</div>
          <h3 class="contact__info-title">{{ info.title }}</h3>
          <p class="contact__info-text" [innerHTML]="info.text"></p>
        </div>
      </div>

      <div class="contact__form-wrapper">
        <h3 class="contact__form-title">Wyślij Wiadomość</h3>
        <form class="contact__form" [formGroup]="contactForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="name">Imię i nazwisko *</label>
            <input type="text" id="name" formControlName="name" required placeholder="Jan Kowalski">
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" formControlName="email" required placeholder="jan@example.com">
          </div>
          <div class="form-group">
            <label for="phone">Telefon</label>
            <input type="tel" id="phone" formControlName="phone" placeholder="+48 123 456 789">
          </div>
          <div class="form-group">
            <label for="message">Wiadomość *</label>
            <textarea id="message" formControlName="message" rows="5" required placeholder="Twoja wiadomość..."></textarea>
          </div>
          <button type="submit" class="btn btn--primary btn--full" [disabled]="!contactForm.valid || isSubmitting">
            <span>{{ isSubmitting ? 'Wysyłanie...' : 'Wyślij Wiadomość' }}</span>
            <svg *ngIf="!isSubmitting" width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M3 10H17M17 10L12 5M17 10L12 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="form-message" *ngIf="formMessage">
            <p [class.success]="formSuccess" [class.error]="!formSuccess">{{ formMessage }}</p>
          </div>
        </form>
      </div>
    </div>

    <div class="contact__map-section">
      <h3 class="contact__map-title">Znajdź Nas</h3>
      <div class="contact__map-wrapper">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2443.5!2d21.0122!3d52.2297!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNTLCsDEzJzQ2LjkiTiAyMcKwMDAnNDMuOSJF!5e0!3m2!1spl!2spl!4v1234567890"
          width="100%" 
          height="500" 
          style="border:0;" 
          allowfullscreen="" 
          loading="lazy" 
          referrerpolicy="no-referrer-when-downgrade"
          class="contact__map">
        </iframe>
      </div>
    </div>
  </div>
  
  <button 
    *ngIf="showScrollButton" 
    class="scroll-to-top" 
    (click)="scrollToTop()"
    aria-label="Przewiń do góry">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>
</section>
