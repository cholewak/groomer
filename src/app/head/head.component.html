<header class="header" [class.header--scrolled]="isScrolled">
  <div class="header__container">
    <app-menu class="header__menu"></app-menu>
    <div class="header__logo-wrapper">
      <a href="/" class="header__logo-link">
        <img class="header__logo" src="../../assets/img/logo_cut.png" alt="Salon Groomerski Karolina Jakubek"/>
      </a>
    </div>
    <div class="header__social">
      <a
        href="https://www.facebook.com/p/Salon-piel%C4%99gnacji-ps%C3%B3w-i-kot%C3%B3w-Karolina-Jakubek-100078916577702/"
        class="header__social-link header__social-link--facebook"
        aria-label="Facebook"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="../../assets/img/facebok.png" class="header__social-icon" alt="facebook"/>
      </a>
      <!-- <a href="#" class="header__social-link" aria-label="Instagram">
        <img src="../../assets/img/instagram.png" class="header__social-icon" alt="instagram"/>
      </a> -->
      <a
        href="https://wa.me/48884895777"
        class="header__social-link header__social-link--whatsapp"
        aria-label="WhatsApp"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="header__social-emoji">💬</span>
      </a>
      <a href="tel:+48884895777" class="header__social-link" aria-label="Telefon">
        <img src="../../assets/img/phone.png" class="header__social-icon" alt="phone"/>
      </a>
    </div>
  </div>
</header>
