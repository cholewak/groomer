<section id="home" class="hero">
  <div class="hero__background">
    <div class="hero__particles"></div>
  </div>
  <div class="hero__container">
    <div class="hero__content">
      <h1 class="hero__title">
        Pielęgnacja<br>
        <span class="hero__title-accent">Twojego Przyjaciela</span>
      </h1>
      <p class="hero__description">
        Profesjonalna opieka nad psami i kotami. Doświadczenie, pasja i miłość do zwierząt w każdym zabiegu.
      </p>
      <div class="hero__cta">
        <a href="tel:+48000000000" class="btn btn--primary">
          <span>Umów Wizytę</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </a>
        <a href="#services" class="btn btn--outline" (click)="scrollToSection('#services', $event)">Nasze Usługi</a>
      </div>
      <div class="hero__stats">
        <div class="hero__stat">
          <div class="hero__stat-number">ok 5000+</div>
          <div class="hero__stat-label">Zadowolonych Klientów</div>
        </div>
        <div class="hero__stat">
          <div class="hero__stat-number">5+</div>
          <div class="hero__stat-label">Lat Doświadczenia</div>
        </div>
        <div class="hero__stat">
          <div class="hero__stat-number">100%</div>
          <div class="hero__stat-label">Zadowolenia</div>
        </div>
      </div>
    </div>
    <div class="hero__image-wrapper">
      <div class="hero__image-decorative"></div>
      <div class="hero__image-container">
        <img class="hero__image" src="../../assets/img/example_img/home.jpg" alt="Pielęgnacja psa">
      </div>
    </div>
  </div>
  <button class="scroll-down-btn" (click)="scrollToServices()" aria-label="Przewiń w dół">
    <span class="scroll-down-text">Przewiń w dół</span>
    <svg class="scroll-down-arrow" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M12 19l-7-7M12 19l7-7"/>
    </svg>
  </button>
</section>
